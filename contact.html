<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySphere - Contact</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>
        <h1>StudySphere</h1>

        <nav>
            <a href="index.html">Home</a>
            <a href="notes.html">Notes</a>
            <a href="pyqs.html">PYQs</a>
            <a href="videos.html">Videos</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>

        <!-- Contact Section -->
        <section class="notes">

            <h2>Contact StudySphere</h2>

            <p>Have suggestions or feedback? Reach out!</p>

            <!-- Email Card -->
            <div class="note-card">
                <h3>Email</h3>
                <p>studysphere@example.com</p>
            </div>

            <!-- Contact Form Card -->
            <div class="note-card">
                <h3>Contact Form</h3>

                <form class="contact-form">

                    <label>Name</label>
                    <input type="text" placeholder="Enter your name">

                    <label>Email</label>
                    <input type="email" placeholder="Enter your email">

                    <label>Message</label>
                    <textarea placeholder="Write your message"></textarea>

                    <button type="submit">Send Message</button>

                </form>

            </div>

            <!-- Future Features Card -->
            <div class="note-card">
                <h3>Future Features</h3>
                <p>We are planning to add live chat support and instant doubt solving soon.</p>
            </div>

        </section>

    </main>

    <!-- Footer -->
    <footer>
        <p>© 2026 StudySphere. All Rights Reserved.</p>
    </footer>

</body>

</html>
